meters:
- name: base_subscription
  description: Fixed monthly plan fee (Starter, Growth, or Premium).
  unit: subscription
  aggregation: sum
  dimensions:
  - account
  - plan
- name: student_lessons
  description: Per-student-lesson usage charge; a multi-student lesson counts once per student.
  unit: lessons
  aggregation: sum
  dimensions:
  - account
  - plan
- name: additional_branches
  description: Monthly fee per branch account beyond the first 5 (Premium plan).
  unit: branches
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Track monthly student-lesson volume per account and branch, since usage charges scale with it; the API itself is not separately metered.
- name: Allocation
  description: Attribute base fee, per-lesson charges, and branch fees to locations or branches to map cost to revenue centers.
- name: Optimization
  description: Choose the plan whose base fee and per-lesson rate minimize total cost at your projected lesson volume; consolidate branches where possible.
- name: Accountability
  description: Assign an owner to review plan tier vs lesson volume monthly and confirm API access (Growth/Premium) matches integration needs.
