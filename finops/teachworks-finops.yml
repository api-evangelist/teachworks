description: >-
  FinOps view of Teachworks spend. Teachworks is a SaaS subscription billed
  monthly as a base plan fee plus a per-student-lesson usage charge, so the
  dominant cost driver is lesson volume (number of students x lessons) rather
  than API calls. The Teachworks API itself carries no metered fee; it is gated
  by plan - available on Growth and Premium but not Starter. Cost optimization
  is therefore a plan-selection exercise: higher plans trade a larger base fee
  for a lower per-lesson rate, so the break-even depends on monthly student
  lesson volume. Premium adds branch-account costs beyond the first five
  branches.
notes: >-
  Verify current base fees and per-student-lesson rates on the Teachworks
  pricing page during reconciliation. There is no separate API metering; API
  access is a plan entitlement (Growth/Premium). Model total cost as
  base_fee + (student_lessons * per_lesson_rate) + additional_branch_fees.
