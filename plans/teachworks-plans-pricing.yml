    name: base_subscription
    type: flat
    metric: subscription
    limit: -1
    timeFrame: month
    geo: global
    unit: 1
    price: 47.99 USD/month
    userMultiplied: false
  - label: Per Student Lesson
    name: student_lesson
    type: usage
    metric: lessons
    limit: -1
    timeFrame: month
    geo: global
    unit: 1
    price: 0.189 USD per student lesson
    userMultiplied: false
  elements:
  - name: Everything in Starter
  - name: Teachworks API Access
