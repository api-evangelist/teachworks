sources:
  - url: https://teachworks.com/addons/api
    type: Documentation
    note: Official Teachworks API add-on page; API available on Growth and Premium plans, over 65 endpoints.
  - url: https://documenter.getpostman.com/view/10096149/SWTABydD
    type: APIReference
    note: Official Teachworks Postman API reference. Source of the confirmed endpoint list, token auth scheme, pagination, and the 4 requests/second rate limit. All REST; no WebSocket.
  - url: https://www.teachworks.com/pricing
    type: Pricing
    note: Starter/Growth/Premium plans; base fee plus per-student-lesson charge. API access on Growth and Premium.
  - url: https://teachworks.featureupvote.com/suggestions/94369/add-webhooks-to-the-teachworks-api
    type: Feedback
    note: Native webhooks are a requested-but-unshipped feature, confirming there is no native webhook (or WebSocket) push surface.
  - url: https://teachworks.zendesk.com/hc/en-us/articles/360038657531-Zapier-Integration
    type: Documentation
    note: Zapier integration uses polling (single page, up to 100 records) and requires API access (Growth/Premium). Confirms no push transport.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists on the Teachworks API, and no native
    webhook surface exists either. The entire public API is request/response
    REST over HTTPS. No AsyncAPI document was created because there is no
    server-push transport on Teachworks' own API to model; third-party
    automation platforms integrate by polling the REST endpoints.
