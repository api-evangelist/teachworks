aid: teachworks
name: Teachworks
review:
  question: Does Teachworks expose a documented public WebSocket API?
  answer: false
  date: '2026-07-03'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. The Teachworks public API is a
    request/response REST API over HTTPS with no server-push transport
    (WebSocket or SSE). Teachworks does not offer native webhooks either;
    event-driven integrations are delivered by third-party polling platforms
    (Zapier, Make, Integrately) that call the same REST endpoints on a schedule.
    There is no Teachworks-hosted streaming or realtime surface to model.
findings:
  summary: |
    Teachworks does not publish a documented public WebSocket API. Teachworks is
    business management software for tutoring companies, music schools, and
    test-prep centers. Its public API is a REST API at
    https://api.teachworks.com/v1, authenticated with an account API token via
    the Authorization header ("Authorization: Token token=API_TOKEN") over
    HTTPS, returning JSON. All documented endpoints are request/response REST
    over resources such as customers, students, employees, lessons, services,
    invoices, payments, and wages. List endpoints are paginated (20 per page,
    up to 80 via per_page) and the API is rate limited to 4 requests per second
    per token. No realtime, bidirectional, or streaming WebSocket (ws:// or
    wss://) endpoint is documented anywhere in the Teachworks API reference.
  webhooks: |
    Teachworks has no native webhook API. Adding webhooks is an openly
    requested-but-unshipped feature on the Teachworks feedback board. Real-time
    style integrations are instead handled by third-party automation platforms
    (Zapier, Make, Integrately) which POLL the Teachworks REST API on a schedule
    (Zapier triggers poll a single page, up to 100 records) rather than
    receiving pushed events. The API is available only on the Growth and
    Premium plans.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.teachworks.com/v1
      documented: true
      note: Token-authenticated request/response REST API returning JSON. The only documented Teachworks API surface.
    - protocol: Webhook
      scheme: https
      documented: false
      note: No native Teachworks webhooks. Event delivery is via third-party polling integrations (Zapier, Make, Integrately), not server push. Native webhooks are a requested feature.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented anywhere in the Teachworks API reference as of the review date.
