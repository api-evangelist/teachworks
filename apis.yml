aid: teachworks
url: https://raw.githubusercontent.com/api-evangelist/teachworks/refs/heads/main/apis.yml
name: Teachworks
kind: company
description: Teachworks is business management software for tutoring companies, music
  schools, test-prep centers, and other education businesses. It handles scheduling,
  student and family CRM, teacher management, lesson and event calendars, online
  billing and invoicing, payments, and teacher wages. The Teachworks API is a REST
  API (base https://api.teachworks.com/v1, token authentication over HTTPS) that
  exposes account data - customers, students, employees, lessons, services,
  invoices, payments, and wages - so companies can build custom integrations. The
  API is available on the Growth and Premium plans; there is no native webhook or
  WebSocket surface, and event-driven integrations are delivered through Zapier,
  Make, and Integrately polling.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Education
- Tutoring
- EdTech
- Scheduling
- Business Management
- CRM
